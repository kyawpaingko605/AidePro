name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
      
      - name: Fix gradle.properties
        run: |
          # gradle.properties ရှိမရှိ စစ်ပြီး AndroidX ထည့်ပေး
          if [ ! -f gradle.properties ]; then
            echo "Creating gradle.properties..."
            touch gradle.properties
          fi
          
          # AndroidX settings ထည့်ပေး (မရှိရင်)
          if ! grep -q "android.useAndroidX" gradle.properties; then
            echo "android.useAndroidX=true" >> gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
            echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
            echo "org.gradle.parallel=true" >> gradle.properties
            echo "org.gradle.caching=true" >> gradle.properties
          fi
          
          echo "✅ gradle.properties content:"
          cat gradle.properties
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
