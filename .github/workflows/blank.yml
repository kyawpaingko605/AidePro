name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
      
      - name: Configure gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF
      
      - name: Add Sora Editor repository to settings.gradle.kts
        run: |
          # Sora repository ထည့်ပြီးပြီလား စစ်ပါ
          if ! grep -q "sora-editor" settings.gradle.kts; then
            echo '        maven { url = uri("https://maven.pkg.github.com/Rosemoe/sora-editor") }' >> settings.gradle.kts
          fi
          
          echo "📄 settings.gradle.kts content:"
          cat settings.gradle.kts
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
