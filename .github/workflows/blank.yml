name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 📌 gradlew မရှိရင် အလိုအလျောက်ထုတ်ပေး
      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            echo "⚠️ gradlew not found! Creating wrapper..."
            gradle wrapper
            chmod +x gradlew
          else
            echo "✅ gradlew found!"
            chmod +x gradlew
          fi
      
      # 📌 gradlew ရှိပြီးသားဆိုရင်လည်း permission ပေး
      - name: Ensure gradlew is executable
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "❌ gradlew still not found! Check your project structure."
            exit 1
          fi
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
