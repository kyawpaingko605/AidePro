name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # JDK 17 တပ်ဆင်ရန်
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle အတွက် permission သတ်မှတ်ရန်
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # APK (Debug) ထုတ်ယူရန်
      - name: Build APK
        run: ./gradlew assembleDebug

      # APK file ကို artifact အဖြစ် သိမ်းဆည်းရန်
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
